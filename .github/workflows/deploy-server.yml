name: Deploy Mahjong Server

on:
  push:
    branches:
      - master
    # server に関係するファイルが変わった時だけ走らせる
    paths:
      - 'server/**'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # Railway の Nixpacks 側で npm ci / npm run build / npm start を行うため
      # Actions ではビルドせずソースをアップロードするだけにする。
      # ビルド設定は server/railway.json で管理。
      - name: Deploy to Railway
        working-directory: server
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_NAME }} --detach
        env:
          # Railway ダッシュボードの Account Settings > Tokens で発行したトークン
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          # 対象プロジェクトの ID (Project Settings > General > Project ID)
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          # デプロイ先 environment 名 (通常は production)
          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
